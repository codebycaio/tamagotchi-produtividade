<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagotchi da Produtividade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container-do-pet">
        <h1 id="nome-pet">DevGotchi</h1>
        <div id="rosto-pet" style="font-size: 50;">😴</div>

        <p>Vida: <span id="barra-vida">100</span>%</p>

        <button id="btn-dano">Simular Procrastinação</button>
        <button id="btn-cura">Simular Foco</button>

        <hr> <h3>Qual app você abriu?</h3>
        <input type="text" id="input-app" placeholder="Ex: TikTok ou VS Code">
        <button id="btn-verificar">Verificar App</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
