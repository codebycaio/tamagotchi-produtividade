<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagotchi da Produtividade</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container-do-pet">
        <h1 id="nome-pet">DevGotchi</h1>

        <!-- Emoji do pet -->
        <div id="rosto-pet">😴</div>

        <!-- Barra de vida visual (o span#barra-vida continua existindo, mas escondido,
             pois o JavaScript ainda usa ele para guardar o número) -->
        <div class="vida-container">
            <div class="vida-barra-interna" id="barra-interna"></div>
        </div>
        <p class="vida-texto">Vida: <span id="barra-vida">100</span>%</p>

        <!-- Seção: Simulação rápida -->
        <div class="secao">
            <h3>Simulação Rápida</h3>
            <button id="btn-dano">😩 Simular Procrastinação</button>
            <button id="btn-cura">🧠 Simular Foco</button>
        </div>

        <!-- Seção: Verificar app aberto -->
        <div class="secao">
            <h3>Qual app você abriu?</h3>
            <input type="text" id="input-app" placeholder="Ex: TikTok ou VS Code">
            <button id="btn-verificar">Verificar App</button>
        </div>

        <!-- Seção: Cadastrar novo app -->
        <div class="secao">
            <h3>Cadastrar Novo App</h3>
            <input type="text" id="input-novo-app" placeholder="Ex: WhatsApp">
            <select id="select-categoria">
                <option value="dano">Procrastinação (Dano)</option>
                <option value="cura">Foco (Cura)</option>
            </select>
            <button id="btn-cadastrar-app">Salvar App</button>
        </div>

        <!-- Seção: Apps cadastrados (accordion) -->
        <div class="secao">
            <!-- O header vira um botão clicável. O JS vai usar o ID para ouvir o clique -->
            <button id="btn-accordion" class="accordion-header">
                <span>Apps Cadastrados</span>
                <span class="accordion-seta">▾</span>
            </button>
            <!-- Este div começa fechado. O JS adiciona a classe 'aberto' para abrir -->
            <div id="conteudo-accordion" class="accordion-conteudo">
                <p class="lista-titulo">💀 Dano</p>
                <ul id="lista-dano"></ul>
                <p class="lista-titulo">✅ Cura</p>
                <ul id="lista-cura"></ul>
            </div>
        </div>

        <!-- Danger Zone: ações destrutivas ficam isoladas e sinalizadas -->
        <div id="danger-zone">
            <p class="danger-titulo">⚠️ Zona de Perigo</p>
            <p class="danger-descricao">Estas ações são irreversíveis.</p>
            <button id="btn-reset">Resetar Pet</button>
        </div>
    </div>

    <div id="toast"></div>

    <script src="app.js"></script>
</body>

</html>
